<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <!-- Human figure forming the vertical of E, standing as part of nature -->
  <!-- Head -->
  <circle cx="24" cy="14" r="6" fill="#4ade80"/>
  <!-- Body/trunk - the vertical stroke of E -->
  <line x1="24" y1="20" x2="24" y2="52" stroke="#4ade80" stroke-width="5" stroke-linecap="round"/>
  <!-- Arms reaching out like branches - top bar of E -->
  <line x1="24" y1="28" x2="46" y2="22" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>
  <!-- Middle branch/arm - middle bar of E -->
  <line x1="24" y1="38" x2="42" y2="36" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs/roots grounding - bottom bar of E -->
  <line x1="24" y1="52" x2="46" y2="52" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>
</svg>
